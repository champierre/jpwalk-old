<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- White background -->
  <rect width="512" height="512" fill="white"/>
  
  <!-- Red circle background -->
  <circle cx="256" cy="256" r="200" fill="#E53E3E"/>
  
  <!-- Walking person silhouette in white -->
  <g transform="translate(256, 256)">
    <!-- Head -->
    <circle cx="0" cy="-60" r="25" fill="white"/>
    
    <!-- Body (torso) -->
    <path d="
      M 0 -35
      L 0 10
      L -5 25
      L -8 30
      L 8 30
      L 5 25
      L 0 10
      Z
    " fill="white"/>
    
    <!-- Back leg (bent, stepping) -->
    <path d="
      M -5 25
      L -15 50
      L -20 75
      L -18 95
      L -22 95
      L -20 100
      L -10 100
      L -8 95
      L -10 95
      L -8 75
      L 0 50
      L 5 25
      Z
    " fill="white"/>
    
    <!-- Front leg (extended) -->
    <path d="
      M 5 25
      L 20 50
      L 35 75
      L 40 95
      L 36 95
      L 38 100
      L 48 100
      L 50 95
      L 46 95
      L 42 75
      L 25 50
      L 10 30
      Z
    " fill="white"/>
    
    <!-- Back arm (swinging forward) -->
    <path d="
      M 0 -20
      L 15 -10
      L 30 5
      L 35 20
      L 32 22
      L 28 8
      L 12 -7
      L 0 -15
      Z
    " fill="white"/>
    
    <!-- Front arm (swinging back) -->
    <path d="
      M 0 -20
      L -20 -10
      L -35 0
      L -40 10
      L -37 12
      L -32 2
      L -17 -7
      L 0 -15
      Z
    " fill="white"/>
  </g>
</svg>