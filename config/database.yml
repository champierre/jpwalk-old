default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  <<: *default
  database: storage/development.sqlite3

test:
  <<: *default
  database: storage/test.sqlite3

production:
  primary: &primary_production
    adapter: postgresql
    encoding: unicode
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    username: <%= ENV['DB_USER'] %>
    password: <%= ENV['DB_PASSWORD'] %>
    host: <%= ENV['DB_HOST'] %>
    port: <%= ENV['DB_PORT'] || 5432 %>
  cache:
    <<: *primary_production
    database: <%= ENV['CACHE_DATABASE_NAME'] || 'jpwalk_production_cache' %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: <%= ENV['QUEUE_DATABASE_NAME'] || 'jpwalk_production_queue' %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: <%= ENV['CABLE_DATABASE_NAME'] || 'jpwalk_production_cable' %>
    migrations_paths: db/cable_migrate
